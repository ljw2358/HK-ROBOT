<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK-FIGURE | CHAIRMAN LEE JAEWAN</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;900&family=Noto+Sans+KR:wght@100;400;900&family=Cinzel:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --neon-blue: #00FFFF;
            --silver: #C0C0C0;
            --dark-bg: #000000;
            --gold: #D4AF37;
        }

        /* 1. 폰 화면 깨짐 방지 (반응형 극한 보정) */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; overflow-x: hidden; background: var(--dark-bg); color: white; line-height: 1.8; }
        img, video { max-width: 100%; height: auto; }

        /* 2. 언어 변환 정지 및 레이아웃 고정 */
        .lang-fixed-bar {
            position: fixed; top: 15px; right: 15px; z-index: 10000;
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--neon-blue);
            padding: 8px 12px; border-radius: 4px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
            max-width: 180px; box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        .lang-fixed-bar span { font-size: 10px; color: var(--neon-blue); font-weight: 900; letter-spacing: 1px; }

        /* 메인 히어로 */
        header {
            min-height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        .hero-title {
            font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 10vw, 8rem);
            color: var(--neon-blue); letter-spacing: clamp(5px, 3vw, 20px); font-weight: 900;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5); margin-bottom: 20px;
        }
        .hero-sub { font-family: 'Montserrat'; font-size: 14px; color: #666; letter-spacing: 5px; text-transform: uppercase; }

        /* 로봇 비전 섹션 */
        .content-section { max-width: 1200px; margin: 100px auto; padding: 0 20px; }
        .pillar-card {
            background: #080808; border: 1px solid #1a1a1a; border-radius: 10px;
            margin-bottom: 40px; overflow: hidden; transition: 0.4s;
        }
        .pillar-card:hover { border-color: var(--neon-blue); box-shadow: 0 0 30px rgba(0,255,255,0.2); }

        summary {
            padding: 40px 25px; font-family: 'Montserrat'; font-size: clamp(1.2rem, 4vw, 2.5rem);
            font-weight: 900; color: var(--silver); cursor: pointer; list-style: none;
            display: flex; justify-content: space-between; align-items: center;
        }
        summary::after { content: "+"; font-size: 1.5rem; color: var(--neon-blue); }
        details[open] summary::after { content: "-"; }

        .details-body { padding: 0 25px 50px; border-top: 1px solid #1a1a1a; padding-top: 30px; }
        .details-body h3 { font-size: 1.8rem; color: white; margin-bottom: 25px; border-left: 6px solid var(--neon-blue); padding-left: 15px; }
        .details-body p { color: #888; font-size: 1.1rem; line-height: 2; margin-bottom: 30px; }

        /* 3. 유튜브/틱톡 링크 (터치 영역 확대 및 강제 새 창) */
        footer { padding: 100px 20px; text-align: center; border-top: 1px solid #111; }
        .sns-hub { display: flex; justify-content: center; gap: 50px; margin-bottom: 80px; }
        .sns-hub a {
            display: inline-flex; flex-direction: column; align-items: center; 
            text-decoration: none; color: white; transition: 0.4s;
        }
        .sns-hub i { font-size: 4rem; margin-bottom: 15px; }
        .sns-hub span { font-size: 0.9rem; font-weight: 900; letter-spacing: 3px; }
        .sns-hub a:hover { color: var(--neon-blue); transform: translateY(-10px); }

        .sig { font-family: 'Cinzel'; font-size: 1.2rem; color: #222; letter-spacing: 15px; font-weight: 900; }

        /* 모바일 최적화 (깨짐 방지 핵심) */
        @media (max-width: 600px) {
            .hero-title { letter-spacing: 5px; }
            .sns-hub { flex-direction: row; gap: 30px; }
            .sns-hub i { font-size: 3rem; }
            summary { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="lang-fixed-bar">
        <span>KOR</span><span>ENG</span><span>CHN</span><span>ARA</span><span>JPN</span><span>RUS</span>
    </div>

    <header>
        <div class="hero-title">HK-FIGURE</div>
        <div class="hero-sub">CHAIRMAN LEE JAEWAN</div>
    </header>

    <div class="content-section">
        <div class="pillar-card">
            <details open>
                <summary>POSCO x FIGURE AI</summary>
                <div class="details-body">
                    <h3>환상적인 콜라보레이션</h3>
                    <p>Figure AI의 압도적 인공지능 영혼과 포스코의 강철 육체가 만났습니다. HK-FIGURE는 이들의 독점적 콜라보를 통해 세계 최강의 휴머노이드 로봇을 탄생시킵니다.</p>
                </div>
            </details>
        </div>
        </div>

    <footer>
        <div class="sns-hub">
            <a href="https://www.youtube.com/@HK-Holdings" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-youtube" style="color:#FF0000;"></i>
                <span>YOUTUBE</span>
            </a>
            <a href="https://www.tiktok.com/@hkholdings" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-tiktok"></i>
                <span>TIKTOK</span>
            </a>
        </div>
        <div class="sig">CHAIRMAN LEE JAEWAN</div>
    </footer>

</body>
</html>
