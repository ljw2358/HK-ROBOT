<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK-ROBOT</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; background-color: #000; color: #fff; line-height: 1.6; }
        .container { width: 92%; max-width: 1200px; margin: 0 auto; }
        
        header { background: rgba(0,0,0,0.95); padding: 12px 0; position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: 900; color: #007bff; text-decoration: none; }
        
        .lang-selector { position: relative; }
        .lang-btn { background: #111; color: #fff; border: 1px solid #007bff; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 11px; }
        .lang-dropdown { display: none; position: absolute; right: 0; background: #111; min-width: 130px; border: 1px solid #333; border-radius: 4px; margin-top: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1001; }
        .lang-dropdown a { color: #ccc; padding: 10px; text-decoration: none; display: block; font-size: 13px; border-bottom: 1px solid #222; }
        .lang-dropdown a:hover { background: #007bff; color: #fff; }
        .lang-selector:hover .lang-dropdown { display: block; }

        .hero { min-height: 40vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 120px 0 40px; }
        .hero h1 { font-size: 2.2rem; background: linear-gradient(to right, #fff, #007bff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .section-title { text-align: center; font-size: 1.5rem; margin: 30px 0; color: #007bff; }
        
        /* 미디어 박스 디자인 수정 */
        .media-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 50px; }
        .media-box { background: #0a0a0a; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 10px; overflow: hidden; background: #111; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .tiktok-container { display: flex; justify-content: center; background: #0a0a0a; border-radius: 15px; padding: 10px; border: 1px solid #333; }
        .tiktok-wrapper { width: 100%; max-width: 325px; min-height: 580px; }

        footer { padding: 40px 0; text-align: center; border-top: 1px solid #222; }
        .contact-info { color: #007bff; font-weight: bold; text-decoration: none; display: block; margin-bottom: 15px; }
    </style>
</head>
<body>

<header>
    <div class="container header-flex">
        <a href="#" class="logo">HK-ROBOT</a>
        <div class="lang-selector">
            <button class="lang-btn" id="cur-lang">🌐 Language (언어)</button>
            <div class="lang-dropdown">
                <a href="#" onclick="setLang('ko', '한국어')">한국어</a>
                <a href="#" onclick="setLang('en', 'English')">English</a>
                <a href="#" onclick="setLang('zh', '中文')">中文</a>
                <a href="#" onclick="setLang('ar', 'العربية')">العربية</a>
                <a href="#" onclick="setLang('hi', 'हिन्दी')">हिन्दी</a>
                <a href="#" onclick="setLang('es', 'Español')">Español</a>
                <a href="#" onclick="setLang('pt', 'Português')">Português</a>
                <a href="#" onclick="setLang('uk', 'Українська')">Українська</a>
                <a href="#" onclick="setLang('ja', '日本語')">日本語</a>
                <a href="#" onclick="setLang('ru', 'Русский')">Русский</a>
            </div>
        </div>
    </div>
</header>

<section class="hero">
    <div class="container">
        <h1 id="h-title">HK-ROBOT: 미래를 설계하다</h1>
        <p id="h-desc" style="color:#aaa;">OpenMind를 장악하여 전 세계 로봇에 파이(Pi)의 영혼을 심겠습니다.</p>
    </div>
</section>

<div class="container">
    <h2 class="section-title">Global Insight</h2>
    <div class="media-grid">
        <div class="media-box">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/7XpL9_R_rVE" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>

        <div class="tiktok-container">
            <div class="tiktok-wrapper">
                <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@figure" data-unique-id="figure" data-embed-from="embed_page" style="width: 100%;">
                    <section><a target="_blank" href="https://www.tiktok.com/@figure?refer=embed">@figure</a></section>
                </blockquote>
                <script async src="https://www.tiktok.com/embed.js"></script>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container">
        <a href="mailto:info@hkwb.co.kr" class="contact-info">info@hkwb.co.kr</a>
        <p style="color:#444; font-size: 12px;">&copy; 2026 HK Group. All rights reserved.</p>
    </div>
</footer>

<script>
    // 언어 데이터 생략 (동일)
    const data = {
        ko: { hT:"HK-ROBOT: 미래를 설계하다", hD:"OpenMind를 장악하여 전 세계 로봇에 파이(Pi)의 영혼을 심겠습니다." },
        en: { hT:"HK-ROBOT: Engineering the Future", hD:"Seizing OpenMind to implant Pi's soul into robots worldwide." }
        // ... (필요시 추가)
    };

    function setLang(lang, name) {
        const l = data[lang];
        if(l) {
            document.getElementById('h-title').innerText = l.hT;
            document.getElementById('h-desc').innerText = l.hD;
        }
        document.getElementById('cur-lang').innerText = "🌐 " + name;
    }
</script>
</body>
</html>
